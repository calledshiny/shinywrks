<script>
(function() {
  const canvas = document.getElementById('dot-grid-canvas');
  const ctx = canvas.getContext('2d');
  const SPACING = 20;
  const BASE_RADIUS = 1.0;
  const BASE_ALPHA = 0.15;
  const REPEL_RADIUS = 140;
  const MAX_REPEL = 6;
  const LERP_SPEED = 0.04;

  let mouse = { x: -999, y: -999 };
  let dots = [];

  const BASE_COLOR    = [100, 88, 72];
  const CHROME_DARK   = [80,  74, 65];
  const CHROME_MID    = [160, 155, 148];
  const CHROME_BRIGHT = [255, 254, 252];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    buildDots();
  }

  function buildDots() {
    dots = [];
    const cols = Math.ceil(canvas.width / SPACING) + 2;
    const rows = Math.ceil(canvas.height / SPACING) + 2;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        dots.push({
          bx: c * SPACING,
          by: r * SPACING,
          ox: 0, oy: 0,
          vx: 0, vy: 0,
          tx: 0, ty: 0,
          a: BASE_ALPHA,
        });
      }
    }
  }

  window.addEventListener('mousemove', e => {
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const interactive = el && el.closest('button, a, input, select, textarea, [role="button"]');
    if (interactive) { mouse.x = -999; mouse.y = -999; }
    else { mouse.x = e.clientX; mouse.y = e.clientY; }
  });

  window.addEventListener('mouseleave', () => {
    mouse.x = -999; mouse.y = -999;
  });

  window.addEventListener('resize', resize);
  resize();

  // ── Pulse wave system ──────────────────────────────────────────
  let pulses = [];
  let lastPulseTime = performance.now();
  let nextPulseIn = 1000 + Math.random() * 1500;

  function spawnPulse() {
    pulses.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: 0,
      maxRadius: Math.hypot(canvas.width, canvas.height),
      speed: 8 + Math.random() * 4,
      intensity: 1.2 + Math.random() * 0.4,
      sigma: 45 + Math.random() * 25,
    });
  }

  function draw() {
    const now = performance.now();
    if (now - lastPulseTime > nextPulseIn) {
      // Only spawn if new origin is far enough from existing ones
      let tries = 0, spawned = false;
      while (tries++ < 8 && !spawned) {
        const nx = Math.random() * canvas.width;
        const ny = Math.random() * canvas.height;
        const tooClose = pulses.some(p => Math.hypot(nx - p.x, ny - p.y) < 250);
        if (!tooClose) { pulses.push({ x: nx, y: ny, radius: 0, maxRadius: 500 + Math.random() * 400, speed: 6 + Math.random() * 4, intensity: 0.55 + Math.random() * 0.25, sigma: 60 + Math.random() * 40 }); spawned = true; }
      }
      lastPulseTime = now;
      nextPulseIn = 400 + Math.random() * 500;
    }
    // advance pulses — accelerate so they reach the edge faster
    pulses = pulses.filter(p => p.radius < p.maxRadius);
    for (const p of pulses) { p.speed += 0.5; p.radius += p.speed; }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < dots.length; i++) {
      const d = dots[i];
      const dx = d.bx - mouse.x;
      const dy = d.by - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < REPEL_RADIUS && dist > 0) {
        const force = (1 - dist / REPEL_RADIUS);
        d.tx = (dx / dist) * force * MAX_REPEL;
        d.ty = (dy / dist) * force * MAX_REPEL;
        d.ta = BASE_ALPHA + force * 1.0;
        d.tc = force;
      } else {
        d.tx = 0; d.ty = 0;
        d.ta = BASE_ALPHA;
        d.tc = 0;
      }

      // Pulse contribution — alpha glow + subtle radial push
      let pulseAlpha = 0;
      let pulsePushX = 0, pulsePushY = 0;
      for (const p of pulses) {
        const pdx = d.bx - p.x;
        const pdy = d.by - p.y;
        const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
        const delta = pdist - p.radius;
        const fade = Math.pow(1 - p.radius / p.maxRadius, 1.0);
        const contribution = p.intensity * fade * Math.exp(-0.5 * Math.pow(delta / p.sigma, 2));
        pulseAlpha += contribution;
        if (pdist > 0) {
          const pushMag = contribution * 4;
          pulsePushX += (pdx / pdist) * pushMag;
          pulsePushY += (pdy / pdist) * pushMag;
        }
      }

      // Spring physics: reactive but natural
      d.vx = (d.vx + (d.tx - d.ox) * 0.26) * 0.58;
      d.vy = (d.vy + (d.ty - d.oy) * 0.26) * 0.58;
      d.ox += d.vx;
      d.oy += d.vy;
      const aSpeed = (dist < REPEL_RADIUS && dist > 0) ? 0.45 : 0.12;
      d.a  = (d.a  || BASE_ALPHA) + ((d.ta || BASE_ALPHA) - d.a)  * aSpeed;
      d.cf = (d.cf || 0)          + ((d.tc || 0)          - d.cf) * aSpeed;

      // Rod shape: cursor only
      const cursorMag = Math.sqrt(d.ox * d.ox + d.oy * d.oy);
      const totalMag = cursorMag;
      const rodAngle = cursorMag > 0.01 ? Math.atan2(d.oy, d.ox) : 0;
      const tiltFactor = Math.min(1, totalMag / 8);
      const cf = d.cf || 0;
      const baseR = BASE_RADIUS;
      const radiusX = baseR + totalMag * 0.28;
      const radiusY = Math.max(0.4, baseR * (1 - tiltFactor * 0.55));

      // Flat single color — slightly brighter under cursor
      const boost = Math.round((d.cf || 0) * 55);
      const r = Math.min(255, BASE_COLOR[0] + boost);
      const g = Math.min(255, BASE_COLOR[1] + boost);
      const b = Math.min(255, BASE_COLOR[2] + boost);
      const finalAlpha = Math.min(1, d.a + pulseAlpha);

      ctx.beginPath();
      ctx.ellipse(d.bx + d.ox, d.by + d.oy, radiusX, radiusY, rodAngle, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${finalAlpha})`;
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  draw();
})();
</script>

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = React.useState(() => localStorage.getItem('shiny-page') || 'home');
  const [activeProject, setActiveProject] = React.useState(() => {
    try { const s = localStorage.getItem('shiny-project'); return s ? JSON.parse(s) : null; } catch { return null; }
  });
  const [activeFilter, setActiveFilter] = React.useState('All');
  React.useEffect(() => { localStorage.setItem('shiny-page', page); }, [page]);
  React.useEffect(() => {
    if (activeProject) localStorage.setItem('shiny-project', JSON.stringify(activeProject));
  }, [activeProject]);

  const nav = (p, proj = null) => {
    setPage(p);
    if (proj) setActiveProject(proj);
    window.scrollTo({ top: 0 });
  };

  return (
    <div>
      <Nav page={page} onNav={nav}/>

      {page === 'home'    && <Landing onNav={nav} activeFilter={activeFilter} setActiveFilter={setActiveFilter}/>}
      {page === 'project' && <ProjectDetail project={activeProject} onNav={nav}/>}
      {page === 'contact' && <Kontakt/>}

      <Footer onNav={nav}/>


    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
